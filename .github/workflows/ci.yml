name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m mypy src
      - run: python -m pytest --cov=jlceda2kicad --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml

  package:
    name: Build PCM package
    runs-on: windows-latest
    needs: test
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/render_icons.py
      - run: python scripts/build_package.py
      - run: python -m kipy.packaging validate dist/JLCEDA2KICAD-0.1.0.zip
      - uses: actions/upload-artifact@v4
        with:
          name: JLCEDA2KICAD-0.1.0
          path: |
            dist/JLCEDA2KICAD-0.1.0.zip
            dist/JLCEDA2KICAD-0.1.0.zip.sha256
            dist/JLCEDA2KICAD-0.1.0.zip.manifest.txt
