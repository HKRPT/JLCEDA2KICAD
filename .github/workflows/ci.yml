name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m mypy src scripts
      - run: python -m pytest --cov=jlceda2kicad --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml

  package:
    name: Build PCM package
    runs-on: windows-latest
    needs: test
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/offline_vendor.py download --wheelhouse .offline-build/wheelhouse
      - run: >-
          python scripts/offline_vendor.py expand
          --wheelhouse .offline-build/wheelhouse
          --output .offline-build/vendor
          --licenses .offline-build/third_party_licenses
          --inventory .offline-build/inventory.json
      - run: python scripts/offline_vendor.py verify --vendor .offline-build/vendor
      - run: python scripts/build_package.py --vendor-dir .offline-build/vendor
      - run: python -m kipy.packaging validate dist/JLCEDA2KICAD-0.1.0.zip
      - run: >-
          python scripts/build_repository_site.py local
          --tag v0.1.0
          --archive dist/JLCEDA2KICAD-0.1.0.zip
          --checksum dist/JLCEDA2KICAD-0.1.0.zip.sha256
          --manifest dist/JLCEDA2KICAD-0.1.0.zip.manifest.txt
          --download-url http://127.0.0.1:8765/JLCEDA2KICAD-0.1.0.zip
          --base-url http://127.0.0.1:8765
          --published-at 2026-07-15T08:00:00Z
          --output _site
      - uses: actions/upload-artifact@v4
        with:
          name: JLCEDA2KICAD-0.1.0
          path: |
            dist/JLCEDA2KICAD-0.1.0.zip
            dist/JLCEDA2KICAD-0.1.0.zip.sha256
            dist/JLCEDA2KICAD-0.1.0.zip.manifest.txt
            _site
